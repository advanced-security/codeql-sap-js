version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      all-actions:
        patterns: ["*"]
    versioning-strategy: lockfile-only
    default-days: 7
  - package-ecosystem: "npm"
    directory: "/extractors/cds/tools"
    schedule:
      interval: "weekly"
    groups:
      all-npm:
        patterns: ["*"]
    versioning-strategy: lockfile-only
    default-days: 7
